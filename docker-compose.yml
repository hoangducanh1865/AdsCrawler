networks:
  marketing-net:
    driver: bridge

services:
  # 1. Database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: mkt_clickhouse
    environment:
      - CLICKHOUSE_DB=marketing_db
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=password123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - marketing-net

  # 2. Apache Kafka (KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: mkt_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qo'

    networks:
      - marketing-net

  # 2b. Kafka Connect (S3 Sink → MinIO)
  kafka-connect:
    image: confluentinc/cp-kafka-connect:latest
    container_name: mkt_kafka_connect
    depends_on:
      - kafka
      - minio
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: mkt-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command:
      - bash
      - -c
      - |
        echo "Installing S3 Sink Connector plugin..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:latest
        echo "Installing JDBC Sink Connector plugin..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest
        echo "Downloading ClickHouse JDBC driver..."
        curl -fL -o /usr/share/confluent-hub-components/confluentinc-kafka-connect-jdbc/lib/clickhouse-jdbc.jar \
          https://repo1.maven.org/maven2/com/clickhouse/clickhouse-jdbc/0.3.2/clickhouse-jdbc-0.3.2-all.jar
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run
    networks:
      - marketing-net

  # 2c. Auto-register S3 Sink Connector
  kafka-connect-init:
    image: curlimages/curl:latest
    container_name: mkt_kafka_connect_init
    depends_on:
      - kafka-connect
    volumes:
      - ./kafka-connect/connect-s3-sink.json:/s3-config.json:ro
      - ./kafka-connect/connect-jdbc-sink.json:/jdbc-config.json:ro
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Kafka Connect...' &&
      until curl -s http://kafka-connect:8083/connectors > /dev/null; do sleep 5; done &&
      echo 'Registering S3 Sink Connector...' &&
      curl -s -X PUT http://kafka-connect:8083/connectors/minio-s3-sink/config -H 'Content-Type: application/json' -d @/s3-config.json &&
      echo 'Registering JDBC Sink Connector...' &&
      curl -s -X PUT http://kafka-connect:8083/connectors/clickhouse-jdbc-sink/config -H 'Content-Type: application/json' -d @/jdbc-config.json &&
      echo 'All connectors registered!'
      "
    networks:
      - marketing-net

  # 2d. Kafka UI (Monitoring)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mkt_kafka_ui
    depends_on:
      - kafka
      - kafka-connect
    ports:
      - "8084:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: marketing-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: mkt-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - marketing-net

  # 3. MinIO
  minio:
    image: minio/minio:latest
    container_name: mkt_minio
    ports:
      - "9005:9000"
      - "9006:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - marketing-net

  minio-init:
    image: minio/mc:latest
    container_name: mkt_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set myminio http://minio:9000 admin password123) do echo 'Waiting for MinIO...' && sleep 1; done; /usr/bin/mc mb myminio/marketing-datalake; /usr/bin/mc anonymous set public myminio/marketing-datalake; exit 0; "
    networks:
      - marketing-net

  # superset:
  #   build: 
  #     context: .
  #     dockerfile: Dockerfile.superset
  #   container_name: mkt_superset
  #   ports:
  #     - "8088:8088"
  #   environment:
  #     - SUPERSET_SECRET_KEY=marketing_big_data_key_2026
  #     - ADMIN_USERNAME=admin
  #     - ADMIN_EMAIL=admin@fab.org
  #     - ADMIN_PASSWORD=password123
  #     - SQLALCHEMY_DATABASE_URI=sqlite:////app/superset_home/superset.db
  #   depends_on:
  #     - clickhouse
  #     - kafka
  #     - minio
  #   volumes:
  #     - superset_data:/app/superset_home
  #   networks:
  #     - marketing-net
  #   entrypoint: >
  #     /bin/sh -c "
  #     superset fab create-admin --username $$ADMIN_USERNAME --firstname Superset --lastname Admin --email $$ADMIN_EMAIL --password $$ADMIN_PASSWORD || true &&
  #     superset db upgrade &&
  #     superset init &&
  #     superset run -p 8088 --with-threads --reload --debugger --host 0.0.0.0
  #     "

  spark-master:
    image: apache/spark:3.5.1
    container_name: mkt_spark_master
    # Phải có lệnh này thì container mới không thoát (exit)
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/spark/work-dir
    networks:
      - marketing-net

  spark-worker:
    image: apache/spark:3.5.1
    container_name: mkt_spark_worker
    # Lệnh khởi động worker trỏ về master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - marketing-net

  # 5. Airflow Metadata Database
  postgres:
    image: postgres:13
    container_name: mkt_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - marketing-net

  airflow-init:
    image: apache/airflow:2.7.1
    container_name: mkt_airflow_init
    depends_on:
      - postgres
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c " mkdir -p /opt/airflow/logs/scheduler && pip install confluent-kafka requests && airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password password123 || true "
    networks:
      - marketing-net
    volumes:
      - ./:/opt/spark/work-dir
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/.ivy2:/home/airflow/.ivy2

  # 6. Airflow Webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mkt_airflow:latest
    container_name: mkt_airflow_webserver
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=password123
      - _AIRFLOW_WWW_USER_EMAIL=admin@example.com
      - _AIRFLOW_WWW_USER_FIRSTNAME=Admin
      - _AIRFLOW_WWW_USER_LASTNAME=User
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./:/opt/spark/work-dir
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/.ivy2:/home/airflow/.ivy2
    ports:
      - "8082:8080"
    command: airflow webserver
    networks:
      - marketing-net

  # 7. Airflow Scheduler 
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mkt_airflow:latest
    container_name: mkt_airflow_scheduler
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=password123
      - _AIRFLOW_WWW_USER_EMAIL=admin@example.com
      - _AIRFLOW_WWW_USER_FIRSTNAME=Admin
      - _AIRFLOW_WWW_USER_LASTNAME=User
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./:/opt/spark/work-dir
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/.ivy2:/home/airflow/.ivy2
    command: airflow scheduler
    networks:
      - marketing-net

  # 8. Speed Layer (Spark Structured Streaming)
  speed-layer:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: mkt_airflow:latest
    container_name: mkt_speed_layer
    depends_on:
      - kafka
      - spark-master
      - minio-init
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_BUCKET=marketing-datalake
      - SPEED_LAYER_TRIGGER=30 seconds
    command: >
      spark-submit
      --master spark://spark-master:7077
      --jars /opt/airflow/jars/spark-sql-kafka.jar,/opt/airflow/jars/kafka-clients.jar,/opt/airflow/jars/hadoop-aws.jar,/opt/airflow/jars/aws-java-sdk-bundle.jar,/opt/airflow/jars/commons-pool2.jar,/opt/airflow/jars/spark-token-provider-kafka.jar
      /opt/spark/work-dir/spark_consumer/speed_layer.py
    volumes:
      - ./:/opt/spark/work-dir
    networks:
      - marketing-net
    restart: on-failure

volumes:
  clickhouse_data:
  minio_data:
  superset_data:
