apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-consumer
  namespace: marketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch-consumer
  template:
    metadata:
      labels:
        app: batch-consumer
    spec:
      containers:
        - name: batch-consumer
          image: mkt_airflow:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: MINIO_ENDPOINT
              value: "http://minio:9000"
            - name: MINIO_ACCESS_KEY
              value: "admin"
            - name: MINIO_SECRET_KEY
              value: "password123"
            - name: MINIO_BUCKET
              value: "marketing-datalake"
          command:
            - bash
            - -c
            - |
              cd /opt/spark/work-dir
              export PYTHONPATH=$PYTHONPATH:/opt/spark/work-dir
              pip install --quiet minio openpyxl pandas confluent-kafka
              while true; do
                python3 -m ingest.workers.batch_consumer
                echo 'batch_consumer exited, restarting in 5s...'
                sleep 5
              done
          volumeMounts:
            - mountPath: /opt/spark/work-dir
              name: project-dir
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: project-dir
          hostPath:
            path: /opt/spark/work-dir
            type: Directory
